; ARK <-> Archipelago connector config. Fill these in, then run the connector
; (double-click run_connector.bat, or `python ark_ap_connector.py`).
; Command-line flags override anything here.
[connector]
; Your Archipelago room address (host:port) - shown when you host/join the room.
server = archipelago.gg:38281

; Your slot / player name, exactly as in your yaml (case-sensitive).
; In multiplayer this must ALSO be your in-game survivor name (as shown by /whoami).
slot = YourSlotName

; Room password (leave blank if none).
password =

; The plugin's ipc folder on THIS PC. Points inside the ArkAP plugin folder.
; Everyone uses this SAME root folder - solo and multiplayer alike.
ipc_dir = E:\ARK\Server\ShooterGame\Binaries\Win64\ArkApi\Plugins\ArkAP\ipc

; MULTIPLAYER: set true when the plugin runs with "multiplayer": true. The connector then
; uses ipc_dir\<slot> as its own mailbox and creates that folder automatically - run one
; connector per player. Your ARK survivor name must equal your slot (see /whoami).
; Leave false for solo / single-player.
multiplayer = false

; Optional: folder with engrams/dinos/locations/crates.json for naming. Blank = the folder
; containing ipc_dir (the plugin folder), which is where those files are deployed.
data_dir =

; DeathLink default (the yaml slot_data overrides this on connect). true/false.
death_link = true

; Optional: full path to the ARK server's Game.ini. When the yaml has randomize_dino_spawns on,
; the connector patches the NPCReplacements block in this file automatically (only its own marked
; block - your other settings are untouched). Leave blank to just get ipc\game_ini_fragment.txt
; to paste in yourself. Restart the ARK server after it changes. Example:
; game_ini = E:\ARK\Server\ShooterGame\Saved\Config\WindowsServer\Game.ini
game_ini =
